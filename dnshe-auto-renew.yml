name: DNSHE Auto Renew

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run renewal check
        env:
          DNSHE_API_KEY: ${{ secrets.DNSHE_API_KEY }}
          DNSHE_API_SECRET: ${{ secrets.DNSHE_API_SECRET }}
          DNSHE_DOMAINS: ${{ vars.DNSHE_DOMAINS }}
        run: |
          python scripts/dnshe_auto_renew.py --state state/domains-state.json

      - name: Commit updated renewal state
        run: |
          if git diff --quiet -- state/domains-state.json; then
            echo "No state changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/domains-state.json
          git commit -m "chore: update DNSHE renewal state"
          git push
